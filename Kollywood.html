      body {
        font-family: Arial;

        text-align: center;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.6); /* adjust 0.5–0.7 */

        z-index: 0;
      }

      /* Keep content above overlay */
      .container,
      h1,
      h3,
      .life,
      #clue,
      #message {
        position: relative;
        z-index: 2;
      }

      h1 {
        margin-top: 20px;
      }

      .container {
        margin-top: 20px;
      }

      h3 {
        margin-top: 10px;
      }

      input {
        padding: 10px;
        margin: 5px;
        border-radius: 5px;
        border: none;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        border-radius: 5px;
        background: #ff4757;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #ff6b81;
      }

      .life {
        font-size: 30px;
        letter-spacing: 5px;
        margin: 20px;
      }

      .strike {
        text-decoration: line-through;
        color: red;
      }

      #message {
        margin-top: 20px;
        font-size: 20px;
      }

      #celebration {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.9);
        color: white;

        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;

        font-size: 30px;
        z-index: 999;
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0);
        pointer-events: none;

        transition: 0.6s ease;
        z-index: 1;
      }

      /* Bring game above overlay */
      .container,
      h1,
      .life,
      #clue,
      #message {
        position: relative;
        z-index: 2;
      }

      /* Spotlight effect around clue */
      #clue {
        margin-top: 15px;
        color: yellow;
        font-size: 18px;
        min-height: 24px;
        letter-spacing: 1px;

        transition: 0.5s;
      }

      #clue {
        text-shadow:
          0 0 10px yellow,
          0 0 20px orange;
      }

      /* blinking cursor */
      .cursor {
        display: inline-block;
        width: 2px;
        background: yellow;
        margin-left: 3px;
        animation: blink 0.8s infinite;
      }

      @keyframes blink {
        0%,
        50%,
        100% {
          opacity: 1;
        }
        25%,
        75% {
          opacity: 0;
        }
      }

      /* When clue is shown */
      #clue.show {
        opacity: 1;
        transform: translateY(0);
        text-shadow: 0 0 10px yellow;
      }
      .show {
        opacity: 1;
      }

      /* Hint style */
      .hint {
        font-size: 18px;
        color: #ccc;
      }

      /* Shake animation */
      @keyframes shake {
        0% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        50% {
          transform: translateX(5px);
        }
        75% {
          transform: translateX(-5px);
        }
        100% {
          transform: translateX(0);
        }
      }

      .shake {
        animation: shake 0.3s;
      }
    </style>
  </head>
  <body>

          clue: "Mathematician assassin using disguises",
        },

      let game = data[Math.floor(Math.random() * data.length)];

      let livesWord = "KOLLYWOOD".split("");
      let wrong = 0;
      let score = 0;
      let multiplier = 1; // Added missing multiplier
      let roundFinished = false;
      let round = 1;
      let locked = { movie: false, hero: false, heroine: false };
      let guessed = { movie: false, hero: false, heroine: false };

      function createHint(word) {
        let hint = word[0];
        for (let i = 1; i < word.length; i++) {
          if (word[i] === " ") hint += "  ";
          else hint += " _";
        }
        return hint;
      }

      function openDoor(callback) {
        const box = document.getElementById("gameBox");
        box.style.transition = "0.6s ease";
        box.style.transform = "scale(0.8)";
        box.style.opacity = "0.3";

        setTimeout(() => {
          box.style.transform = "scale(1)";
          box.style.opacity = "1";
          if (callback) callback();
        }, 600);
      }

      function showHints() {
        document.getElementById("movieHint").innerText = createHint(game.movie);
        document.getElementById("heroHint").innerText = createHint(game.hero);
        document.getElementById("heroineHint").innerText = createHint(
          game.heroine,
        );
      }

      function typeWriter(text, callback) {
        const clueBox = document.getElementById("clue");
        clueBox.innerHTML = "";
        let i = 0;
        function typing() {
          if (i < text.length) {
            clueBox.innerHTML =
              text.substring(0, i + 1) + "<span class='cursor'></span>";
            i++;
            setTimeout(typing, 40);
          } else {
            clueBox.innerHTML = text;
            if (callback) callback();
          }
        }
        typing();
      }

      function updateUI() {
        document.getElementById("score").innerText = score;
        document.getElementById("round").innerText = round;
      }

      function updateLife() {
        let display = "";
        for (let i = 0; i < livesWord.length; i++) {
          if (i < wrong) {
            display += "<span class='strike'>" + livesWord[i] + "</span>";
          } else {
            display += "<span>" + livesWord[i] + "</span>";
          }
        }
        document.getElementById("lifeDisplay").innerHTML = display;
      }

      function shakeScreen() {
        const box = document.getElementById("gameBox");
        box.classList.add("shake");
        setTimeout(() => box.classList.remove("shake"), 300);
      }

      function checkWin() {
        if (guessed.movie && guessed.hero && guessed.heroine) {
          // 1. Add exactly 10 points
          score += 10;

          // 2. Update the UI immediately
          updateUI();

          // 3. Set round as finished
          roundFinished = true;

          // 4. Show the celebration screen
          document.getElementById("celeText").innerText =
            "You earned 10 points! Total Score: " + score;
          document.getElementById("celebration").style.display = "flex";
        }
      }

      function checkLose() {
        if (wrong >= 9) {
          document.getElementById("message").innerHTML =
            "💀 Game Over!<br>Movie: " +
            game.movie +
            "<br>Hero: " +
            game.hero +
            "<br>Heroine: " +
            game.heroine;

          roundFinished = true; // CRITICAL FIX: Allow next round after losing
          multiplier = 1; // Reset multiplier on loss
        }
      }

      function wrongGuess() {
        wrong++;
        updateLife();
        shakeScreen();

        if (wrong === 4) {
          document.getElementById("overlay").style.background =
            "rgba(0,0,0,0.75)";
          typeWriter("💡 Clue: " + game.clue, function () {
            setTimeout(() => {
              document.getElementById("overlay").style.background =
                "rgba(0,0,0,0)";
            }, 800);
          });
        }
        checkLose();
      }

      function guessMovie() {
        if (locked.movie || roundFinished) return;
        let input = document
          .getElementById("movieInput")
          .value.trim()
          .toLowerCase();
        if (input === game.movie.toLowerCase()) {
          guessed.movie = true;
          locked.movie = true;
          document.getElementById("movieInput").disabled = true;
          document.getElementById("message").innerHTML = "✅ Movie Correct!";
          checkWin();
        } else {
          wrongGuess();
        }
      }

      function guessHero() {
        if (locked.hero || roundFinished) return;
        let input = document
          .getElementById("heroInput")
          .value.trim()
          .toLowerCase();
        if (input === game.hero.toLowerCase()) {
          guessed.hero = true;
          locked.hero = true;
          document.getElementById("heroInput").disabled = true;
          document.getElementById("message").innerHTML = "✅ Hero Correct!";
          checkWin();
        } else {
          wrongGuess();
        }
      }

      function guessHeroine() {
        if (locked.heroine || roundFinished) return;
        let input = document
          .getElementById("heroineInput")
          .value.trim()
          .toLowerCase();
        if (input === game.heroine.toLowerCase()) {
          guessed.heroine = true;
          locked.heroine = true;
          document.getElementById("heroineInput").disabled = true;
          document.getElementById("message").innerHTML = "✅ Heroine Correct!";
          checkWin();
        } else {
          wrongGuess();
        }
      }

      function nextRound() {
        // 🚫 BLOCK ONLY IF NOT FINISHED
        if (!roundFinished) {
          document.getElementById("message").innerHTML =
            "❌ Finish this round first!";
          return;
        }

        // 1. Hide the celebration overlay immediately
        document.getElementById("celebration").style.display = "none";

        openDoor(() => {
          roundFinished = false;

          // Pick a new random movie
          game = data[Math.floor(Math.random() * data.length)];

          // ... reset all the variables (same as your previous code) ...
          wrong = 0;
          guessed = { movie: false, hero: false, heroine: false };
          locked = { movie: false, hero: false, heroine: false };

          document.getElementById("message").innerHTML = "";
          document.getElementById("clue").innerHTML = "";
          document.getElementById("overlay").style.background = "rgba(0,0,0,0)";

          // Clear and enable inputs
          document.getElementById("movieInput").value = "";
          document.getElementById("heroInput").value = "";
          document.getElementById("heroineInput").value = "";
          document.getElementById("movieInput").disabled = false;
          document.getElementById("heroInput").disabled = false;
          document.getElementById("heroineInput").disabled = false;

          updateLife();
          showHints();

          round++;
          updateUI();
        });
      }

      // Initial setup
      updateLife();
      showHints();
      updateUI();
    </script>
